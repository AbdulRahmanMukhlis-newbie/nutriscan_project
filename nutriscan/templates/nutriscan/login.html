<!-- nutriscan/templates/nutriscan/login.html -->
{% extends 'nutriscan/base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white text-center">
                <h4>Masuk ke NutriScan</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100 mt-3">Masuk</button>
                </form>
                <p class="text-center mt-3 text-muted">Belum punya akun? <a href="{% url 'register' %}">Daftar di sini</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

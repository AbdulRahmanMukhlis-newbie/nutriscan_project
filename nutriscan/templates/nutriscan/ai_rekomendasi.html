{% extends 'nutriscan/base.html' %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header bg-primary text-white">
        <h4 class="mb-0">
            Rekomendasi Menu AI
        </h4>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Kondisi Tubuh / Keluhan
                </label>

                <input
                    type="text"
                    name="kondisi"
                    class="form-control"
                    placeholder="Contoh: Maag, Asam Lambung, Diabetes"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Target Diet
                </label>

                <input
                    type="text"
                    name="target"
                    class="form-control"
                    placeholder="Contoh: Menurunkan berat badan"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Analisis Nutrisi

            </button>

        </form>

        {% if hasil %}

        <div class="alert alert-success mt-4">

            <h5 class="mb-3">
                Hasil Analisis AI
            </h5>

            <pre style="white-space: pre-wrap; font-family: inherit;">
{{ hasil }}
            </pre>

        </div>

        {% endif %}

    </div>

</div>

{% endblock %}
